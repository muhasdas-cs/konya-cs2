<!DOCTYPE html>

<html>
<head>
<title>CS2 Lig</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    padding: 25px;
    background: linear-gradient(90deg, #111827, #020617);
    margin: 0;
    color: #f97316;
}

table {
    width: 95%;
    margin: 30px auto;
    border-collapse: collapse;
}

th {
    background: #111827;
    padding: 14px;
    color: #9ca3af;
}

td {
    padding: 14px;
    border-bottom: 1px solid #1f2937;
}

tr:hover {
    background: rgba(249,115,22,0.08);
    transform: scale(1.01);
}

.rank {
    font-weight: bold;
    color: #f97316;
}

.player {
    cursor: pointer;
}

.loading {
    text-align: center;
    margin-top: 50px;
}
</style>

</head>

<body>

<h1>🏆 CS2 KONYA LİGİ</h1>

<div id="loading" class="loading">Yükleniyor...</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Oyuncu</th>
<th>ELO</th>
<th>Rank</th>
<th>Win%</th>
<th>Maç</th>
<th>Win</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
<th>Rounds</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

fetch("./players.json")
.then(res => res.json())
.then(data => {

    document.getElementById("loading").style.display = "none";

    let table = document.getElementById("table");

    data.forEach((p, i) => {

        table.innerHTML += `
        <tr class="player" onclick="openProfile('${p.name}')">
            <td>${i+1}</td>
            <td>🎮 ${p.name}</td>
            <td>${p.elo}</td>
            <td class="rank">${p.rank}</td>
            <td>%${p.winrate}</td>
            <td>${p.matches}</td>
            <td>${p.wins}</td>
            <td>${p.kd}</td>
            <td>${p.adr}</td>
            <td>${p.hs_percent}%</td>
            <td>${p.rounds}</td>
        </tr>
        `;
    });

});

// 🔥 EN KRİTİK FIX
function openProfile(name){
    window.location.href = "profile.html?player=" + encodeURIComponent(name);
}

</script>

</body>
</html>
