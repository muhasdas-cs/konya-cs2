<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS2 KONYA LİGİ</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
    margin:0;
}
h1 { text-align:center; padding:20px; color:#f97316; }
table { width:95%; margin:auto; border-collapse:collapse; }
th, td { padding:10px; text-align:center; }
tr:hover { background:rgba(249,115,22,0.1); cursor:pointer; }
.box { width:90%; margin:auto; margin-top:20px; }
</style>
</head>
<body>

<h1>🏆 CS2 KONYA LİGİ</h1>

<table>
<thead>
<tr>
<th>#</th><th>Oyuncu</th><th>ELO</th><th>Win%</th><th>KD</th><th>ADR</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="box">
<h2>MAÇLAR</h2>
<div id="matches"></div>

<h2>TAKIM OLUŞTUR</h2>
<button onclick="makeTeams('adr')">ADR</button>
<button onclick="makeTeams('elo')">ELO</button>
<button onclick="makeTeams('kd')">KD</button>
<div id="teams"></div>
</div>

<script>
let players=[];

fetch("players.json").then(r=>r.json()).then(data=>{
 players=data;
 let t=document.getElementById("table");
 data.forEach((p,i)=>{
  t.innerHTML+=`<tr onclick="go('${p.name}')">
  <td>${i+1}</td>
  <td>🔫 ${p.name}</td>
  <td>${p.elo}</td>
  <td>%${p.winrate}</td>
  <td>${p.kd}</td>
  <td>${p.adr}</td>
  </tr>`;
 });
});

fetch("matches.json").then(r=>r.json()).then(ms=>{
 let div=document.getElementById("matches");
 ms.forEach(m=>{
  div.innerHTML+=`<div>${m.match} (${m.score})</div>`;<div onclick="openMatch('${m.match}')">
${m.match} (${m.score})
</div>});
});

function openMatch(match){
    window.location = "match.html?match=" + match;
}

function go(name){
 location="profile.html?player="+encodeURIComponent(name);
}

function makeTeams(type){
 let sorted=[...players].sort((a,b)=>b[type]-a[type]);
 let t1=[],t2=[];
 sorted.forEach((p,i)=>{ (i%2==0?t1:t2).push(p.name); });
 teams.innerHTML="<b>TEAM 1</b><br>"+t1.join("<br>")+"<br><br><b>TEAM 2</b><br>"+t2.join("<br>");
}
</script>

</body>
</html>
