<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>CS2 Konya Ligi</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    padding: 25px;
    background: linear-gradient(90deg, #111827, #020617);
    margin: 0;
    color: #f97316;
}

table {
    width: 95%;
    margin: 30px auto;
    border-collapse: collapse;
}

th {
    background: #111827;
    padding: 12px;
    color: #9ca3af;
}

td {
    padding: 12px;
    border-bottom: 1px solid #1f2937;
}

tr:hover {
    background: rgba(249,115,22,0.08);
    cursor: pointer;
}

.rank {
    color: #f97316;
    font-weight: bold;
}

.loading {
    text-align: center;
    margin-top: 40px;
}
</style>

</head>

<body>

<h1>🏆 CS2 KONYA LİGİ</h1>

<div id="loading" class="loading">Yükleniyor...</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Oyuncu</th>
<th>ELO</th>
<th>Rank</th>
<th>Win%</th>
<th>Maç</th>
<th>Win</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
<th>Rounds</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

fetch("./players.json")
.then(response => response.json())
.then(data => {

    document.getElementById("loading").style.display = "none";

    var table = document.getElementById("table");

    data.forEach(function(p, i){

        var row = "<tr onclick=\"openProfile('" + p.name + "')\">" +
        "<td>" + (i+1) + "</td>" +
        "<td>🎮 " + p.name + "</td>" +
        "<td>" + p.elo + "</td>" +
        "<td class='rank'>" + p.rank + "</td>" +
        "<td>%" + p.winrate + "</td>" +
        "<td>" + p.matches + "</td>" +
        "<td>" + p.wins + "</td>" +
        "<td>" + p.kd + "</td>" +
        "<td>" + p.adr + "</td>" +
        "<td>" + p.hs_percent + "%</td>" +
        "<td>" + p.rounds + "</td>" +
        "</tr>";

        table.innerHTML += row;
    });

});

function openProfile(name){
    window.location.href = "profile.html?player=" + encodeURIComponent(name);
}

</script>

</body>
</html>
