<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS2 Konya Ligi</title>
<style>
body {background:#020617;color:white;font-family:Arial;}
h1{text-align:center;color:#f97316;}
table{width:90%;margin:auto;border-collapse:collapse;}
th,td{padding:10px;text-align:center;}
tr:hover{background:#111827;cursor:pointer;}
.match{background:#111827;margin:5px;padding:8px;border-radius:6px;}
</style>
</head>
<body>

<h1>🏆 CS2 KONYA LİGİ</h1>

<table>
<thead>
<tr>
<th>#</th><th>Oyuncu</th><th>ELO</th><th>Win%</th><th>KD</th><th>ADR</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<h2 style="margin-left:5%">MAÇLAR</h2>
<div id="matches"></div>

<script>
fetch("players.json").then(r=>r.json()).then(data=>{
 let t="";
 data.forEach((p,i)=>{
  t+=`<tr onclick="location.href='profile.html?player='+p.name">
  <td>${i+1}</td><td>${p.name}</td><td>${p.elo}</td>
  <td>%${p.winrate}</td><td>${p.kd}</td><td>${p.adr}</td></tr>`;
 });
 document.getElementById("table").innerHTML=t;
});

fetch("matches.json").then(r=>r.json()).then(m=>{
 let div="";
 m.forEach(x=>{
  div+=`<div class="match" onclick="location.href='match.html?match='+x.match">
  ${x.match} (${x.score})
  </div>`;
 });
 document.getElementById("matches").innerHTML=div;
});
</script>

</body>
</html>
