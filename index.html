<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>CS2 Konya Ligi</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
}

h1 {
    text-align: center;
    padding: 25px;
    background: linear-gradient(90deg, #111827, #020617);
    margin: 0;
    color: #f97316;
}

table {
    width: 95%;
    margin: 30px auto;
    border-collapse: collapse;
}

th {
    background: #111827;
    padding: 12px;
    color: #9ca3af;
    cursor: pointer;
}

td {
    padding: 12px;
    border-bottom: 1px solid #1f2937;
    text-align: center;
}

tr {
    transition: 0.2s;
}

tr:hover {
    background: rgba(249,115,22,0.1);
    transform: scale(1.01);
    box-shadow: 0 0 10px rgba(249,115,22,0.4);
}

.rank {
    color: #f97316;
    font-weight: bold;
}

.loading {
    text-align: center;
    margin-top: 40px;
}
</style>

</head>

<body>

<h1>🏆 CS2 KONYA LİGİ</h1>

<div id="loading" class="loading">Yükleniyor...</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Oyuncu</th>
<th onclick="sortData('elo')">ELO</th>
<th>Rank</th>
<th onclick="sortData('winrate')">Win%</th>
<th onclick="sortData('matches')">Maç</th>
<th onclick="sortData('wins')">Win</th>
<th onclick="sortData('kd')">K/D</th>
<th onclick="sortData('adr')">ADR</th>
<th onclick="sortData('hs_percent')">HS%</th>
<th onclick="sortData('rounds')">Rounds</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

<script>

let playersData = [];
let currentSort = "";
let sortAsc = false;

fetch("./players.json")
.then(res => res.json())
.then(data => {
    document.getElementById("loading").style.display = "none";
    playersData = data;
    renderTable(playersData);
});

function renderTable(data){
    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach((p, i)=>{
        table.innerHTML += `
        <tr onclick="openProfile('${p.name}')">
            <td>${i+1}</td>
            <td>🎮 ${p.name}</td>
            <td>${p.elo}</td>
            <td class="rank">${p.rank}</td>
            <td>%${p.winrate}</td>
            <td>${p.matches}</td>
            <td>${p.wins}</td>
            <td>${p.kd}</td>
            <td>${p.adr}</td>
            <td>${p.hs_percent}%</td>
            <td>${p.rounds}</td>
        </tr>`;
    });
}

function sortData(key){

    if(currentSort === key){
        sortAsc = !sortAsc;
    } else {
        sortAsc = false;
        currentSort = key;
    }

    playersData.sort((a,b)=>{
        return sortAsc ? a[key]-b[key] : b[key]-a[key];
    });

    renderTable(playersData);
}

function openProfile(name){
    window.location.href = "profile.html?player=" + encodeURIComponent(name);
}

</script>

</body>
</html>
