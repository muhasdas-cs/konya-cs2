<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Player Profile</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial, sans-serif;
}

.header {
    padding: 40px;
    text-align: center;
}

.card {
    width: 80%;
    margin: 20px auto;
}

.match {
    background: #1f2937;
    padding: 10px;
    margin: 5px;
    border-radius: 6px;
}
</style>

</head>

<body>

<div class="header">
<h1 id="name"></h1>
</div>

<div class="card" id="history"></div>

<script>

const params = new URLSearchParams(window.location.search);
const playerName = params.get("player");

// MATCH HISTORY
fetch("./matches.json")
.then(res => res.json())
.then(matches => {

    let container = document.getElementById("history");

    matches.forEach(m => {

        if(m.players.includes(playerName)){

            container.innerHTML += `
            <div class="match">
                ${m.match} | ${m.score}
            </div>
            `;
        }

    });

});

// NAME
fetch("./players.json")
.then(res => res.json())
.then(data => {
    let p = data.find(x => x.name === playerName);
    document.getElementById("name").innerText = "🎮 " + p.name;
});

</script>

</body>
</html>
