<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Player Profile</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.header {
    padding: 30px;
    text-align: center;
}

.name { color: orange; font-size: 26px; }

.grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 15px;
    width: 80%;
    margin: auto;
}

.stat {
    background: #1f2937;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.match {
    background: #111827;
    margin: 8px;
    padding: 10px;
    border-radius: 6px;
}

.win { color: #22c55e; }
.lose { color: #ef4444; }

</style>

</head>

<body>

<div class="header">
    <div id="name"></div>
    <div id="elo"></div>
</div>

<div class="grid">
    <div class="stat"><b id="kd"></b><br>K/D</div>
    <div class="stat"><b id="winrate"></b><br>Win%</div>
    <div class="stat"><b id="matches"></b><br>Matches</div>
    <div class="stat"><b id="wins"></b><br>Wins</div>
    <div class="stat"><b id="adr"></b><br>ADR</div>
    <div class="stat"><b id="hs"></b><br>HS%</div>
</div>

<h3 style="text-align:center;">📜 Match History</h3>
<div id="history"></div>

<script>

const playerName = new URLSearchParams(window.location.search).get("player");

// PLAYER
fetch("players.json")
.then(r=>r.json())
.then(data=>{
    let p = data.find(x=>x.name===playerName);

    document.getElementById("name").innerText = "🎮 "+p.name;
    document.getElementById("elo").innerText = p.elo+" ("+p.rank+")";

    kd.innerText = p.kd;
    winrate.innerText = "%"+p.winrate;
    matches.innerText = p.matches;
    wins.innerText = p.wins;
    adr.innerText = p.adr;
    hs.innerText = p.hs_percent+"%";
});

// MATCHES
fetch("matches.json")
.then(r=>r.json())
.then(matches=>{

    let div = document.getElementById("history");

    matches.forEach(m=>{

        let result = "";
        let cls = "";

        if(m.team1.includes(playerName)){
            result = (m.winner === 1) ? "WIN" : "LOSE";
        }
        else if(m.team2.includes(playerName)){
            result = (m.winner === 2) ? "WIN" : "LOSE";
        }

        if(result !== ""){
            cls = result==="WIN" ? "win":"lose";

            div.innerHTML += `
            <div class="match">
                ${m.match} (${m.score}) - <span class="${cls}">${result}</span>
            </div>`;
        }

    });

});

</script>

</body>
</html>
