<!DOCTYPE html>

<html>
<head>
<title>Player Profile</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

/* HEADER */
.header {
    padding: 40px;
    text-align: center;
    background: linear-gradient(90deg, #111827, #020617);
}

.name {
    font-size: 28px;
    color: #f97316;
}

.elo {
    font-size: 20px;
    margin-top: 10px;
}

/* CARD */
.card {
    width: 80%;
    margin: 30px auto;
    background: rgba(17,24,39,0.8);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(249,115,22,0.2);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.stat {
    background: #1f2937;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}

.stat h2 {
    margin: 0;
    color: #f97316;
}

.stat p {
    margin: 5px 0 0;
    color: #9ca3af;
}

/* BACK BUTTON */
.back {
    margin: 20px;
    cursor: pointer;
    color: #f97316;
}
</style>

</head>

<body>

<div class="back" onclick="goBack()">← Geri</div>

<div class="header">
    <div class="name" id="name">Yükleniyor...</div>
    <div class="elo" id="elo"></div>
</div>

<div class="card">
    <div class="grid">

```
    <div class="stat">
        <h2 id="kd"></h2>
        <p>K/D</p>
    </div>

    <div class="stat">
        <h2 id="winrate"></h2>
        <p>Win Rate</p>
    </div>

    <div class="stat">
        <h2 id="matches"></h2>
        <p>Matches</p>
    </div>

    <div class="stat">
        <h2 id="wins"></h2>
        <p>Wins</p>
    </div>

    <div class="stat">
        <h2 id="adr"></h2>
        <p>ADR</p>
    </div>

    <div class="stat">
        <h2 id="hs"></h2>
        <p>HS%</p>
    </div>

</div>
```

</div>

<script>

// URL'den player çek
const params = new URLSearchParams(window.location.search);
const playerName = params.get("player");

fetch("./players.json")
.then(res => res.json())
.then(data => {

    const player = data.find(p => p.name === playerName);

    if(!player){
        document.body.innerHTML = "Oyuncu bulunamadı";
        return;
    }

    document.getElementById("name").innerText = "🎮 " + player.name;
    document.getElementById("elo").innerText = player.elo + " ELO (" + player.rank + ")";

    document.getElementById("kd").innerText = player.kd;
    document.getElementById("winrate").innerText = "%" + player.winrate;
    document.getElementById("matches").innerText = player.matches;
    document.getElementById("wins").innerText = player.wins;
    document.getElementById("adr").innerText = player.adr;
    document.getElementById("hs").innerText = player.hs_percent + "%";

});

function goBack(){
    window.location.href = "index.html";
}

</script>

</body>
</html>
