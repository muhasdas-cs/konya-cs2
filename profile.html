<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Profile</title>
<style>
body{background:#020617;color:white;font-family:Arial;}
.stat{margin:10px;}
.match{background:#111827;margin:5px;padding:8px;}
</style>
</head>
<body>

<h1 id="name"></h1>
<div id="stats"></div>

<h2>Match History</h2>
<div id="history"></div>

<script>
const player = new URLSearchParams(location.search).get("player");

fetch("players.json").then(r=>r.json()).then(data=>{
 let p=data.find(x=>x.name===player);
 document.getElementById("name").innerText=p.name;
 document.getElementById("stats").innerHTML=
 `ELO:${p.elo} | Win:${p.winrate}% | KD:${p.kd}`;
});

fetch("matches.json").then(r=>r.json()).then(m=>{
 let h="";
 m.forEach(x=>{
  let res="";
  if(x.team1.includes(player)) res = (x.winner==1?"WIN":"LOSE");
  if(x.team2.includes(player)) res = (x.winner==2?"WIN":"LOSE");
  if(res) h+=`<div class="match">${x.match} ${x.score} ${res}</div>`;
 });
 document.getElementById("history").innerHTML=h;
});
</script>

</body>
</html>
