<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Match Detail</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.container { width:95%; margin:auto; }

h1 { text-align:center; color:#f97316; }

.team-block { margin-top:30px; border-radius:10px; overflow:hidden; }

.team-header { padding:10px; font-weight:bold; }

.team1 { background:#022c22; }
.team2 { background:#2c0a0a; }

table { width:100%; border-collapse: collapse; }

th, td { padding:10px; text-align:center; }

th { background:#111827; }

tr:nth-child(even){ background:#1f2937; }

.good { color:#22c55e; }
.bad { color:#ef4444; }
.mid { color:#facc15; }

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div class="team-block team1">
<div class="team-header">TEAM 1</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
</tr>
</thead>
<tbody id="team1"></tbody>
</table>
</div>

<div class="team-block team2">
<div class="team-header">TEAM 2</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
</tr>
</thead>
<tbody id="team2"></tbody>
</table>
</div>

</div>

<script>

const matchName = new URLSearchParams(location.search).get("match");
document.getElementById("title").innerText = matchName;

fetch("data/" + matchName + ".csv")
.then(res => res.text())
.then(text => {

    // 💣 BOM + boşluk temizleme
    text = text.replace(/\r/g, "");
    text = text.trim();

    let lines = text.split("\\n");
    let headers = lines[0].split(",").map(h => h.trim());

    // 💣 HEADER MAP
    let map = {};
    headers.forEach((h, i) => {
        map[h] = i;
    });

    let t1 = [];
    let t2 = [];

    lines.slice(1).forEach(line => {

        if(!line.trim()) return;

        let c = line.split(",");

        let name = c[map["name"]];
        let team = c[map["team"]];

        if(!name) return;

        let k = parseInt(c[map["kills"]]) || 0;
        let d = parseInt(c[map["deaths"]]) || 0;
        let a = parseInt(c[map["assists"]]) || 0;
        let adr = parseFloat(c[map["damage"]]) || 0;
        let hs = parseInt(c[map["head_shot_kills"]]) || 0;

        let p = { name, team, k, d, a, adr, hs };

        if(team == 2) t1.push(p);
        else t2.push(p);

    });

    function render(team, el){

        team.forEach(p => {

            let kd = p.d > 0 ? (p.k/p.d).toFixed(2) : p.k;
            let hsPercent = p.k > 0 ? ((p.hs/p.k)*100).toFixed(1) : 0;

            let kdClass = kd >= 1.2 ? "good" : kd < 0.8 ? "bad" : "mid";

            el.innerHTML += `
            <tr>
                <td>${p.name}</td>
                <td>${p.k}</td>
                <td>${p.d}</td>
                <td>${p.a}</td>
                <td class="${kdClass}">${kd}</td>
                <td>${p.adr}</td>
                <td>${hsPercent}%</td>
            </tr>
            `;
        });
    }

    render(t1, document.getElementById("team1"));
    render(t2, document.getElementById("team2"));

});

</script>

</body>
</html>
