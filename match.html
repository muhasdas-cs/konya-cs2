<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Match Detail</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

h1 {
    text-align:center;
    color:#f97316;
}

.team {
    width:90%;
    margin:20px auto;
}

.team-title {
    font-size:20px;
    margin:10px 0;
}

.win { color:#22c55e; }
.lose { color:#ef4444; }

table {
    width:100%;
    border-collapse: collapse;
}

th, td {
    padding:10px;
    text-align:center;
}

th {
    background:#111827;
}

tr:nth-child(even){
    background:#1f2937;
}

.good { color:#22c55e; }
.bad { color:#ef4444; }
.mid { color:#facc15; }

</style>

</head>

<body>

<h1 id="title">Match</h1>

<div class="team">
<div class="team-title win">TEAM 1</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>ADR</th>
<th>HS%</th>
<th>K/D</th>
</tr>
</thead>
<tbody id="team1"></tbody>
</table>
</div>

<div class="team">
<div class="team-title lose">TEAM 2</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>ADR</th>
<th>HS%</th>
<th>K/D</th>
</tr>
</thead>
<tbody id="team2"></tbody>
</table>
</div>

<script>

const matchName = new URLSearchParams(location.search).get("match");

document.getElementById("title").innerText = matchName;

// CSV OKUMA
fetch("data/" + matchName + ".csv")
.then(res => res.text())
.then(text => {

    let rows = text.split("\\n").slice(1);

    let t1 = document.getElementById("team1");
    let t2 = document.getElementById("team2");

    rows.forEach(r => {

        let c = r.split(",");

        if(c.length < 30) return;

        let name = c[4];
        let team = c[2]; // takım id
        let kills = parseInt(c[5]);
        let deaths = parseInt(c[6]);
        let assists = parseInt(c[8]);
        let adr = parseFloat(c[7]);
        let hs = parseFloat(c[33]);

        let kd = deaths > 0 ? (kills/deaths).toFixed(2) : kills;

        let kdClass = kd >= 1.2 ? "good" : kd < 0.8 ? "bad" : "mid";

        let rowHTML = `
        <tr>
            <td>${name}</td>
            <td>${kills}</td>
            <td>${deaths}</td>
            <td>${assists}</td>
            <td>${adr}</td>
            <td>${hs}%</td>
            <td class="${kdClass}">${kd}</td>
        </tr>
        `;

        if(team == 2){
            t1.innerHTML += rowHTML;
        } else {
            t2.innerHTML += rowHTML;
        }

    });

});

</script>

</body>
</html>
