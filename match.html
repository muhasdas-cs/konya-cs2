<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Match Detail</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.container { width:95%; margin:auto; }

h1 { text-align:center; color:#f97316; }

.team-block { margin-top:30px; border-radius:10px; overflow:hidden; }

.team-header { padding:10px; font-weight:bold; }

.team1 { background:#022c22; }
.team2 { background:#2c0a0a; }

table { width:100%; border-collapse: collapse; }

th, td { padding:10px; text-align:center; }

th { background:#111827; }

tr:nth-child(even){ background:#1f2937; }

.good { color:#22c55e; }
.bad { color:#ef4444; }
.mid { color:#facc15; }

</style>

</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div class="team-block team1">
<div class="team-header">TEAM 1</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
</tr>
</thead>
<tbody id="team1"></tbody>
</table>
</div>

<div class="team-block team2">
<div class="team-header">TEAM 2</div>
<table>
<thead>
<tr>
<th>Player</th>
<th>K</th>
<th>D</th>
<th>A</th>
<th>K/D</th>
<th>ADR</th>
<th>HS%</th>
</tr>
</thead>
<tbody id="team2"></tbody>
</table>
</div>

</div>

<script>

const matchName = new URLSearchParams(location.search).get("match");
document.getElementById("title").innerText = matchName;

fetch("data/" + matchName + ".csv")
.then(res => res.text())
.then(text => {

    let lines = text.split("\\n");

    let headers = lines[0].split(",");

    let t1 = document.getElementById("team1");
    let t2 = document.getElementById("team2");

    function getIndex(name){
        return headers.findIndex(h => h.toLowerCase().includes(name));
    }

    let nameI = getIndex("name");
    let teamI = getIndex("team");
    let kI = getIndex("kill");
    let dI = getIndex("death");
    let aI = getIndex("assist");
    let adrI = getIndex("damage");
    let hsI = getIndex("hs");

    lines.slice(1).forEach(line => {

        let c = line.split(",");
        if(c.length < 5) return;

        let name = c[nameI];
        let team = c[teamI];

        let k = parseInt(c[kI]) || 0;
        let d = parseInt(c[dI]) || 0;
        let a = parseInt(c[aI]) || 0;
        let adr = parseFloat(c[adrI]) || 0;
        let hs = parseFloat(c[hsI]) || 0;

        let kd = d > 0 ? (k/d).toFixed(2) : k;
        let kdClass = kd >= 1.2 ? "good" : kd < 0.8 ? "bad" : "mid";

        let row = `
        <tr>
            <td>${name}</td>
            <td>${k}</td>
            <td>${d}</td>
            <td>${a}</td>
            <td class="${kdClass}">${kd}</td>
            <td>${adr}</td>
            <td>${hs}%</td>
        </tr>
        `;

        if(team == 2) t1.innerHTML += row;
        else t2.innerHTML += row;

    });

});

</script>

</body>
</html>
