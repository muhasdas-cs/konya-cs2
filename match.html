<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Match Detail</title>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: Arial;
}

.container { width:95%; margin:auto; }

h1 { text-align:center; color:#f97316; }

.team-block { margin-top:30px; border-radius:10px; overflow:hidden; }

.team-header { padding:12px; font-weight:bold; font-size:18px; }

.team1 { background:#022c22; }
.team2 { background:#2c0a0a; }

table { width:100%; border-collapse: collapse; }

th, td { padding:12px; text-align:center; }

th {
    background:#111827;
    cursor:pointer;
}

tr:nth-child(even){ background:#1f2937; }

tr:hover {
    background:#374151;
    transform: scale(1.01);
    transition: 0.2s;
}

.player {
    cursor:pointer;
    font-weight:bold;
}

.player:hover {
    color:#f97316;
}

.good { color:#22c55e; }
.bad { color:#ef4444; }
.mid { color:#facc15; }

</style>
</head>

<body>

<div class="container">

<h1 id="title"></h1>

<div class="team-block team1">
<div class="team-header">TEAM 1</div>
<table>
<thead>
<tr>
<th>Player</th>
<th onclick="sortBy('k')">K</th>
<th onclick="sortBy('d')">D</th>
<th onclick="sortBy('a')">A</th>
<th onclick="sortBy('kd')">K/D</th>
<th onclick="sortBy('adr')">ADR</th>
<th onclick="sortBy('hs')">HS%</th>
</tr>
</thead>
<tbody id="team1"></tbody>
</table>
</div>

<div class="team-block team2">
<div class="team-header">TEAM 2</div>
<table>
<thead>
<tr>
<th>Player</th>
<th onclick="sortBy('k')">K</th>
<th onclick="sortBy('d')">D</th>
<th onclick="sortBy('a')">A</th>
<th onclick="sortBy('kd')">K/D</th>
<th onclick="sortBy('adr')">ADR</th>
<th onclick="sortBy('hs')">HS%</th>
</tr>
</thead>
<tbody id="team2"></tbody>
</table>
</div>

</div>

<script>

let t1 = [];
let t2 = [];

const matchName = new URLSearchParams(location.search).get("match");
document.getElementById("title").innerText = matchName;

fetch("data/" + matchName + ".csv")
.then(res => res.text())
.then(text => {

    text = text.replace(/\r/g, "").trim();

    let lines = text.split("\n");
    let headers = lines[0].split(",").map(h => h.trim());

    let map = {};
    headers.forEach((h, i) => map[h] = i);

    let allPlayers = [];

    lines.slice(1).forEach(line => {

        if(!line.trim()) return;

        let c = line.split(",");

        let name = c[map["name"]];
        if(!name) return;

        let k = parseInt(c[map["kills"]]) || 0;
        let d = parseInt(c[map["deaths"]]) || 0;
        let a = parseInt(c[map["assists"]]) || 0;
        let adr = parseFloat(c[map["damage"]]) || 0;
        let hs = parseInt(c[map["head_shot_kills"]]) || 0;

        allPlayers.push({ name, k, d, a, adr, hs });

    });

    // 🔥 ADR’ye göre sırala
    allPlayers.sort((a,b)=>b.adr-a.adr);

    // 💣 OTOMATİK TAKIM AYIRMA (5v5)
    t1 = allPlayers.slice(0,5);
    t2 = allPlayers.slice(5,10);

    render();

});

function render(){

    const el1 = document.getElementById("team1");
    const el2 = document.getElementById("team2");

    el1.innerHTML = "";
    el2.innerHTML = "";

    function draw(team, el){

        team.forEach(p => {

            let kd = p.d > 0 ? (p.k/p.d).toFixed(2) : p.k;
            let hsPercent = p.k > 0 ? ((p.hs/p.k)*100).toFixed(1) : 0;

            let kdClass = kd >= 1.2 ? "good" : kd < 0.8 ? "bad" : "mid";

            el.innerHTML += `
            <tr>
                <td class="player" onclick="goProfile('${p.name}')">${p.name}</td>
                <td>${p.k}</td>
                <td>${p.d}</td>
                <td>${p.a}</td>
                <td class="${kdClass}">${kd}</td>
                <td>${p.adr}</td>
                <td>${hsPercent}%</td>
            </tr>
            `;
        });

    }

    draw(t1, el1);
    draw(t2, el2);
}

function sortBy(type){

    function sorter(a,b){
        if(type === "kd"){
            return (b.k/b.d) - (a.k/a.d);
        }
        return b[type] - a[type];
    }

    t1.sort(sorter);
    t2.sort(sorter);

    render();
}

function goProfile(name){
    window.location.href = "profile.html?player=" + encodeURIComponent(name);
}

</script>

</body>
</html>
